#{extends 'main.html' /}
#{set title:'teste' /}

<head>
    <!-- font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css stylesheet -->
    <link rel="stylesheet" href="/public/stylesheets/estilo.css">
</head>


<main class="sla">


    <div class="containerEs" id="container">
        <div class="form-container sign-up-container">
            <form action="@{Logins.salvar}" method="post">
                <input type="hidden" name="u.id" value="${u?.id}">
                <h1>Criar conta</h1>
                <div class="infield">
                    <div class="red">#{error 'u?.nome'/}</div>
                    <input type="text" placeholder="Nome" name="u.nome" value="${u?.nome}" />
                    <label></label>
                </div>
                <div class="infield">
                    <div class="red">#{error 'u?.email'/}</div>
                    <input type="email" placeholder="Email" name="u.email" value="${u?.email}" />
                    <label></label>
                </div>
                <div class="infield">
                    <div class="red">#{error 'u?.senha'/}</div>
                    <input type="password" placeholder="Senha" name="u.senha" value="${u?.senha}" />
                    <label></label>
                </div>
                <div class="infield">
                    <div>Estilo de combate</div>
                    <select class="form-select" aria-label="Default select example" name="" id="estilo">
                        #{list items:estilos, as:'e'}
                        <option #{if e==u?.classe?.estilo} selected #{/if} value="${e}">${e}</option>
                        #{/list}
                    </select>
                    <label></label>
                </div>

                <div class="infield">
                    <div>Classe</div>
                    <select class="form-select" aria-label="Default select example" name="u.classe.id" id="classe">
                    </select>
                    <label></label>
                </div>
                <button>Registrar</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form action="@{Logins.login}" method="post">
                <h1>Login</h1>
                <div class="infield">
                    <input type="email" placeholder="Email" name="email" />
                    <label></label>
                </div>
                <div class="infield">
                    <input type="password" placeholder="Senha" name="senha" />
                    <label></label>
                </div>
                <button>Entrar</button>
            </form>
        </div>
        <div class="overlay-container" id="overlayCon">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h3>Bem-vindo(a) de volta</h3>
                    <p>Logue com seu email e senha</p>
                    <button style="transform: translateY(-5px);">Logar</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h3>Boas vindas</h3>
                    <p>Junte-se a nós</p>
                    <button style="transform: translateY(1em);">cadastrar-se</button>
                </div>
            </div>
            <button id="overlayBtn"></button>
        </div>
    </div>

</main>


<!-- js code -->
<script>
    const container = document.getElementById('container');
    const overlayCon = document.getElementById('overlayCon');
    const overlayBtn = document.getElementById('overlayBtn');

    overlayBtn.addEventListener('click', () => {
        container.classList.toggle('right-panel-active');

        overlayBtn.classList.remove('btnScalec');
        window.requestAnimationFrame(() => {
            overlayBtn.classList.add('btnScaled')
        })
    })
</script>
